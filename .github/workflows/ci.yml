name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  api-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Unit tests
        working-directory: services/api
        run: |
          go test ./...

  api-docker-compose-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Integration test (docker compose)
        run: |
          ./ops/it.sh
      - name: Logs (on failure)
        if: failure()
        run: |
          docker compose -f ops/compose.yml logs --no-color || true
