services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: photon
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  api:
    build:
      context: ../services/api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/photon?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  ui:
    build:
      context: ../services/ui
    ports:
      - "8081:80"
    depends_on:
      - api

volumes: {}
