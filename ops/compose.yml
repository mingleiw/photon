services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: photon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  api:
    build:
      context: ../services/api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/photon?sslmode=disable
      PROM_URL: http://prometheus:9090
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - prometheus

volumes:
  pgdata:
