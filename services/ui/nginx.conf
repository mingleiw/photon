server {
  listen 80;
  server_name _;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # In Kubernetes, the API Service is named "photon-api".
  # In docker-compose we add a network alias so "photon-api" also resolves.
  location /api/ {
    proxy_pass http://photon-api:8080/api/;
  }
}
